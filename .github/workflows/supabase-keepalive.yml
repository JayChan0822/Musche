name: Supabase Keepalive

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions only supports standard cron, so this approximates every 3 days by day-of-month.
    - cron: '0 3 */3 * *'

permissions:
  contents: read

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Ping Supabase auth settings endpoint
        run: node scripts/supabase-keepalive.mjs
